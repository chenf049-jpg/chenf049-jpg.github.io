<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} · {{ site.title }}</title>
  {% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">{% endif %}
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <meta name="author" content="{{ site.author.name }}">
  <meta name="theme-color" content="#0a0b0d">
  <meta name="color-scheme" content="dark">

  <!-- Modern Design System -->
  <link href="/css/modern.css" rel="stylesheet">

  <!-- Legacy Styles (for backward compatibility) -->
  <link href="/css/typo.css" rel="stylesheet">
  <link href="/css/style.css?body=1" rel="stylesheet">
  <link href="/css/solarized.css" rel="stylesheet">
  <link href="/css/codepiano.css" rel="stylesheet">

  <!-- Font Awesome (for icons) -->
  <link href="//netdna.bootstrapcdn.com/font-awesome/3.1.1/css/font-awesome.css" rel="stylesheet">

  <script src="/js/jquery-2.0.0.min.js"></script>

  <!-- atom & rss feed -->
  <link href="{{ BASE_PATH }}{{ site.codepiano.atom_path }}" type="application/atom+xml" rel="alternate" title="Sitewide ATOM Feed">
  <link href="{{ BASE_PATH }}{{ site.codepiano.rss_path }}" type="application/rss+xml" rel="alternate" title="Sitewide RSS Feed">
</head>
<body>
  <!-- Modern Fixed Header -->
  <header class="modern-header">
    <div class="header-inner">
      <a href="{{ HOME_PATH }}" class="site-logo">
        <span class="gradient-text">{{ site.author.name }}</span>
      </a>
      <nav>
        <ul id="nav-menu" class="header-nav">
          <li><a href="/">首页</a></li>
          <li><a href="/posts.html">文章</a></li>
          <li><a href="/about">关于</a></li>
          <li><a href="/resume">简历</a></li>
        </ul>
      </nav>
      <button class="menu-toggle" onclick="document.getElementById('nav-menu').classList.toggle('open')" aria-label="打开菜单">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="modern-content">
    <div class="content-wrapper">
      {{ content }}
    </div>
  </main>

  <!-- Footer -->
  <footer class="modern-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. All rights reserved.</p>
  </footer>
</body>
</html>
