---
layout: page
title: 分类
header: Posts By Category
group: navigation
index: 3
---
{% include codepiano/setup %}

<div class="categories-list">
  {% for category in site.categories %}
  <section class="category-section">
    <h3 id="{{ category[0] }}-ref" class="category-title">{{ category[0] }}</h3>
    <ul class="category-posts">
      {% assign posts_list = category[1] %}
      {% include codepiano/posts_of_category %}
    </ul>
  </section>
  {% endfor %}
</div>

<style>
.categories-list {
  display: flex;
  flex-direction: column;
  gap: 2rem;
}
.category-section {
  border-bottom: 1px solid var(--border-l1);
  padding-bottom: 1.5rem;
}
.category-section:last-child {
  border-bottom: none;
}
.category-title {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--brand);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--brand-soft);
  text-transform: capitalize;
}
.category-posts {
  list-style: none;
  margin: 0;
  padding: 0;
}
.category-posts li {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border-l1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.category-posts li:last-child {
  border-bottom: none;
}
.category-posts a {
  color: var(--text-default);
  font-weight: 500;
  transition: color 0.2s;
}
.category-posts a:hover {
  color: var(--brand);
}
.category-posts .post-date {
  color: var(--text-tertiary);
  font-size: 0.875rem;
  white-space: nowrap;
  margin-left: 1rem;
}
</style>
